<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Antique Map & Print Dealer</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
        }
    </style>
</head>
<body>

    <div class="auth-wrapper py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card p-4 p-md-5 border-0 shadow-lg position-relative">
                        <div class="d-flex justify-content-end mb-3">
                            <!-- Theme Toggle in Card -->
                            <div class="d-flex align-items-center brand-toggle-pill">
                                <button class="theme-toggle-btn me-1 border-0 bg-transparent" id="rtl-toggle" title="Toggle RTL" style="line-height: 1;">
                                    <span class="rtl-label" style="font-size: 14px; font-weight: bold;">RTL</span>
                                </button>
                                <span class="mx-1" style="font-size: 14px;">|</span>
                                <button class="theme-toggle-btn border-0 bg-transparent" id="theme-toggle" style="line-height: 1;">
                                    <i class="bi bi-moon-fill" style="font-size: 14px;"></i>
                                </button>
                            </div>
                        </div>

                        <div class="text-center mb-4">
                            <a href="index.html" class="navbar-brand d-inline-flex align-items-center justify-content-center m-0">
                                <i class="bi bi-compass me-2 fs-2"></i>
                                <span>ANTIQUE <span class="fw-light">MAPS</span></span>
                            </a>
                        </div>
                        <h2 class="text-center mb-4 fw-bold">Create Account</h2>
                        <form>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">FIRST NAME</label>
                                <input type="text" class="form-control" placeholder="John">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">LAST NAME</label>
                                <input type="text" class="form-control" placeholder="Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                                <input type="email" class="form-control" placeholder="john@example.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">PASSWORD</label>
                                <input type="password" class="form-control" placeholder="••••••••">
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="terms">
                                <label class="form-check-label small text-muted" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms and Conditions</a></label>
                            </div>
                            <button class="btn btn-primary w-100 btn-lg mb-3">Register</button>
                        </form>

                        <div class="text-center position-relative my-4">
                            <hr>
                            <span class="position-absolute top-50 start-50 translate-middle px-3 small" style="background-color: var(--card-bg); color: var(--text-color); opacity: 0.8;">OR CONTINUE WITH</span>
                        </div>

                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn btn-outline-secondary w-100 py-2" style="color: var(--text-color); border-color: rgba(128,128,128,0.5);"><i class="bi bi-google me-2"></i>Google</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-secondary w-100 py-2" style="color: var(--text-color); border-color: rgba(128,128,128,0.5);"><i class="bi bi-facebook me-2"></i>Facebook</button>
                            </div>
                        </div>

                        <p class="text-center mt-5 mb-0 text-muted small">
                            Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log In</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
