<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ANtique mapping</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(10,10,10,0.85), rgba(10,10,10,0.85)), url('assets/images/vault_map_hero_jpg_1774976949861.jpg');
            background-size: cover;
        }
        .auth-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 3.5rem;
            max-width: 500px;
            width: 100%;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }
        .auth-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circleCode, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            transition: all var(--transition-smooth);
            pointer-events: none;
            opacity: 0;
        }
        .auth-card:hover::before {
            opacity: 1;
            top: -50%;
            left: -50%;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2) !important;
        }
        .auth-link {
            transition: all 0.3s ease;
            position: relative;
        }
        .auth-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }
        .auth-link:hover::after {
            width: 100%;
        }
        .social-icon-btn {
            transition: all 0.3s ease;
            border-color: rgba(255,255,255,0.1);
        }
        .social-icon-btn:hover {
            background-color: var(--accent-color, #d4af37);
            border-color: var(--accent-color, #d4af37);
            color: #000 !important;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
    </style>

<script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
            document.documentElement.setAttribute('dir', savedDir);
            if (savedDir === 'rtl') {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css';
                document.head.appendChild(link);
            }
        })();
    </script>
</head>
<body>
    <main>
        <!-- Section 1: Auth Form -->
        <section class="auth-wrapper py-5">
            <div class="container">
                <div class="row justify-content-center align-items-center">
                    <div class="col-lg-6">
                        <div class="auth-card shadow-lg mx-auto position-relative">
                            <div class="position-absolute top-0 end-0 p-3 d-flex gap-2">
                                <!-- Toggles -->
                                <button class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" onclick="toggleTheme()" type="button" aria-label="Toggle theme">
                                    <i class="bi bi-moon-fill fs-5" id="themeIcon"></i>
                                </button>
                                <button class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" onclick="toggleRTL()" type="button" aria-label="Toggle RTL">
                                    <i class="bi bi-translate fs-5"></i>
                                </button>
                            </div>
                            <div class="text-center mb-5">
                                <a href="index.html" class="navbar-brand d-inline-flex align-items-center">
                                    <i class="bi bi-shield-lock me-2 fs-2 text-primary"></i>
                                    <span class="text-theme">Antique Mapping</span>
                                </a>
                            </div>
                            
                            <h5 class="fw-bold text-uppercase mb-4 text-primary text-center ls-2">Client Registration</h5>
                            
                            <form class="text-start">
                                
                                <div class="mb-4">
                                    <label class="form-label small text-secondary">Full Name</label>
                                    <input type="text" class="form-control bg-dark border-secondary text-white py-3 px-4" placeholder="Your Name">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small text-secondary">Email Address</label>
                                    <input type="email" class="form-control bg-dark border-secondary text-white py-3 px-4" placeholder="your@email.com">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small text-secondary">Password</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control bg-dark border-secondary text-white py-3 px-4 border-end-0" placeholder="••••••••">
                                        <button class="btn btn-outline-secondary bg-dark border-secondary border-start-0 text-secondary pe-4" type="button" aria-label="Toggle password visibility">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small text-secondary">Confirm Password</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control bg-dark border-secondary text-white py-3 px-4 border-end-0" placeholder="••••••••">
                                        <button class="btn btn-outline-secondary bg-dark border-secondary border-start-0 text-secondary pe-4" type="button" aria-label="Toggle password visibility">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input bg-dark border-secondary" type="checkbox" id="termsCheck" required>
                                        <label class="form-check-label small text-secondary" for="termsCheck">
                                            I accept the <a href="#" class="text-primary text-decoration-none fw-bold auth-link">Terms and Conditions</a>
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <button class="btn btn-primary w-100 py-3 text-uppercase fw-bold ls-2 btn-hover-accent">Join Now</button>
                                </div>
                                
                                <div class="text-center mb-3 mt-4">
                                    <span class="text-secondary small text-uppercase ls-1">Or connect with</span>
                                </div>
                                <div class="d-flex justify-content-center gap-3 mb-2">
                                    <a href="#" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center social-icon-btn" style="width: 45px; height: 45px;">
                                        <i class="bi bi-google" style="color: #db4437;"></i>
                                    </a>
                                    <a href="#" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center social-icon-btn" style="width: 45px; height: 45px;">
                                        <i class="bi bi-facebook" style="color: #1877f2;"></i>
                                    </a>
                                    <a href="#" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center social-icon-btn" style="width: 45px; height: 45px;">
                                        <i class="bi bi-apple text-theme"></i>
                                    </a>
                                </div>
                            </form>
                            
                            <div class="mt-5 text-center pt-3 border-top border-secondary border-opacity-10">
                                <p class="small text-secondary mb-0">Existing Client? <a href="login.html" class="text-primary text-decoration-none fw-bold auth-link">Access Vault</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
